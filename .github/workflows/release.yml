name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  DALAMUD_HOME: ${{ github.workspace }}\dalamud
  PROJECT_PATH: LogogramHelper\LogogramHelper.csproj

jobs:
  build:
    name: Build plugin
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "$env:DALAMUD_HOME" -Force | Out-Null
          Invoke-WebRequest `
            -Uri "https://goatcorp.github.io/dalamud-distrib/latest.zip" `
            -OutFile "dalamud.zip"
          Expand-Archive -Path "dalamud.zip" -DestinationPath "$env:DALAMUD_HOME" -Force

          if (-not (Test-Path "$env:DALAMUD_HOME\Dalamud.dll")) {
            throw "Dalamud.dll was not found in $env:DALAMUD_HOME."
          }

      - name: Restore dependencies
        run: dotnet restore $env:PROJECT_PATH --locked-mode -p:Platform=x64

      - name: Build release package
        run: dotnet build $env:PROJECT_PATH --configuration Release --no-restore -p:Platform=x64

      - name: Stage package
        id: package
        shell: pwsh
        run: |
          [xml]$project = Get-Content "$env:PROJECT_PATH"
          $version = $project.Project.PropertyGroup.Version
          $artifactDir = Join-Path "$env:GITHUB_WORKSPACE" "artifacts"
          $projectDir = Split-Path -Parent (Join-Path "$env:GITHUB_WORKSPACE" "$env:PROJECT_PATH")
          $binDir = Join-Path $projectDir "bin"

          if (-not (Test-Path $binDir)) {
            throw "Build output directory was not created: $binDir"
          }

          $packages = @(
            Get-ChildItem -Path $binDir -Recurse -Filter "latest.zip" | ForEach-Object {
              $manifestPath = Join-Path $_.DirectoryName "LogogramHelper.json"
              if (Test-Path $manifestPath) {
                [PSCustomObject]@{
                  Zip = $_.FullName
                  Manifest = $manifestPath
                  Modified = $_.LastWriteTimeUtc
                }
              }
            }
          )

          if ($packages.Count -eq 0) {
            Get-ChildItem -Path $binDir -Recurse | ForEach-Object { $_.FullName }
            throw "DalamudPackager did not create latest.zip with LogogramHelper.json under $binDir."
          }

          $package = $packages | Sort-Object Modified -Descending | Select-Object -First 1

          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null
          Copy-Item $package.Zip (Join-Path $artifactDir "LogogramHelper-$version.zip") -Force
          Copy-Item $package.Manifest (Join-Path $artifactDir "LogogramHelper.json") -Force

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogogramHelper-${{ steps.package.outputs.version }}
          path: artifacts/*

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem -Path "artifacts" -File | ForEach-Object { $_.FullName }

          gh release create "${{ github.ref_name }}" `
            $assets `
            --title "Logogram Helper ${{ github.ref_name }}" `
            --generate-notes `
            --latest
